function log(msg){
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

async function startImport(){
  document.getElementById('importBtn').disabled = true;
  log('Začínam import ' + IMPORT_DATA.length + ' spoolov...');
  const BATCH = 50;
  let done = 0;
  for(let i = 0; i < IMPORT_DATA.length; i += BATCH){
    const batch = IMPORT_DATA.slice(i, i + BATCH);
    const updates = {};
    batch.forEach(item => {
      updates['spools/LIG/' + item.isoKey + '/' + item.sid] = item.sp;
    });
    try {
      await update(ref(_db, '/'), updates);
      done += batch.length;
      document.getElementById('bar').style.width = (done/IMPORT_DATA.length*100) + '%';
      if(done % 300 === 0 || done === IMPORT_DATA.length)
        log('✅ ' + done + ' / ' + IMPORT_DATA.length);
    } catch(err){
      log('❌ Chyba: ' + err.message);
      break;
    }
    await new Promise(r => setTimeout(r, 50));
  }
  log('\n🎉 Hotovo!');
  document.getElementById('importBtn').disabled = false;
}

async function clearAll(){
  if(!confirm('Vymazať VŠETKY LIG spooly?')) return;
  document.getElementById('clearBtn').disabled = true;
  log('Mažem...');
  await remove(ref(_db, 'spools/LIG'));
  log('✅ LIG spooly vymazané. Teraz klikni Import.');
  document.getElementById('clearBtn').disabled = false;
}

document.getElementById('importBtn').addEventListener('click', startImport);
document.getElementById('clearBtn').addEventListener('click', clearAll);
